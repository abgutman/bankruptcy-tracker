name: Bankruptcy Poll — Chapter 11 Local Filings

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'backfill or poll'
        required: true
        default: 'poll'
        type: choice
        options:
          - poll
          - backfill
      start_date:
        description: 'Backfill start date (YYYY-MM-DD), default 2026-04-01'
        required: false
        default: '2026-04-01'
      end_date:
        description: 'Backfill end date (YYYY-MM-DD), default today'
        required: false
        default: ''
  schedule:
    - cron: '0 13 * * *'     # 9:00 AM ET (daily)
    - cron: '0 20 * * *'     # 4:00 PM ET (daily)

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run bankruptcy scanner
        env:
          COURTLISTENER_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          MODE="${{ github.event.inputs.mode || 'poll' }}"
          if [ "$MODE" = "poll" ]; then
            python poll_bankruptcies.py poll --live
          else
            START="${{ github.event.inputs.start_date || '2026-04-01' }}"
            END="${{ github.event.inputs.end_date }}"
            CMD="python poll_bankruptcies.py backfill --start=$START"
            [ -n "$END" ] && CMD="$CMD --end=$END"
            $CMD
          fi
          python build_bankruptcy_dashboard.py
          python fetch_docket_entries.py
          python build_case_details.py

      - name: Commit + push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bankruptcy_data/cases.json bankruptcy_data/scan_state.json bankruptcy_data/poll_bankruptcy_log.txt bankruptcy_data/docket_entries/ bankruptcy_data/docket_fetch_state.json bankruptcy_dashboard.html bankruptcy_cases/ 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Auto: bankruptcy poll $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
